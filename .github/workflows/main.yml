name: Build EXE

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install tkinterdnd2 pillow

      - name: Verify required files
        run: |
          $missing = @()
          if (!(Test-Path "unluac.jar"))  { $missing += "unluac.jar" }
          if (!(Test-Path "luac.exe"))    { $missing += "luac.exe" }
          if (!(Test-Path "icon.ico"))    { $missing += "icon.ico" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required files: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required files found."
        shell: pwsh

      - name: Build with PyInstaller
        run: pyinstaller "FW_LUA_Script.spec" --clean --noconfirm

      - name: Rename artifact with version
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -like "v*") {
            $dest = "dist\FW_LUA_Script_$tag.exe"
          } else {
            $sha = "${{ github.sha }}".Substring(0, 7)
            $dest = "dist\FW_LUA_Script_$sha.exe"
          }
          Move-Item "dist\FW LUA Script.exe" $dest
          Write-Host "Output: $dest"
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FW-LUA-Script-exe
          path: dist\*.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: FW-LUA-Script-exe
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
